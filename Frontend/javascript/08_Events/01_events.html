<script>
    //writing onclick inside the image tag is not a good practice because it mixes the structure of the HTML with the behavior of the JavaScript

    // event bubbling is a type of event propagation where the event starts from the target element and then bubbles up to the parent elements. happens when 3rd parameter of addEventListener is set to false or not provided at all.

    //Task is to make the images disappear when clicked by preventing event spillover
    document.querySelector('#images').addEventListener(
        'click', function(e){
            console.log(e.target.parentNode) // e.target gives element on which event is triggered and parentNode gives the parent element of the target element
            if(e.target.tagName === 'IMG') {                // this condition is used to check if the target element is an image element or not. 
                let removeIt  = e.target.parentNode
                removeIt.remove() // this method is used to remove the element from the DOM. In this case, it will remove the parent element of the target element which is the li element that contains the image. So when we click on any image, it will remove the li element that contains that image and make it disappear from the page.
            }
            
            //removeIt.parentNode.removeChild(removeIt) // this is another way to remove the element from the DOM. In this case, it will remove the parent element of the target element which is the li element that contains the image. So when we click on any image, it will remove the li element that contains that image and make it disappear from the page.
        }
    )

    //the above method has a problem that when click on li item instead of image everything inside the li item will be removed because the event is triggered on the li element 
    // and not on the image element. To fix this problem, we can check if the target element is an image element before removing it. We can do this by checking the tagName 
    // property of the target element. If the tagName is 'IMG', then we can remove the parent element of the target element which is the li element that contains the image. 
    // So when we click on any image, it will remove the li element that contains that image and make it disappear from the page. But if we click on any other part of the li element, it will not remove anything from the page.
