<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Api Request</title>
</head>
<body>
     <!--0	UNSENT	Client has been created. open() not called yet.
        1	OPENED	open() has been called.
        2	HEADERS_RECEIVED	send() has been called, and headers and status are available.
        3	LOADING	Downloading; responseText holds partial data.
        4	DONE	The operation is complete. -->
    <div class="container">
        <button id="loadBtn">Show GitHub Info</button>

        <div class="card hidden" id="profileCard">
            <img id="avatar" src="" alt="User avatar">
            <div class="info">
                <h2 id="name">User Name</h2>
                <p id="followers">Followers: 0</p>
                <a id="profileLink" href="#" target="_blank" rel="noopener">Open GitHub Profile</a>
            </div>
        </div>
    </div>
</body>
<style>
    :root {
        color-scheme: light;
    }

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f3f6fb;
        display: grid;
        place-items: center;
        padding: 24px;
        color: #1f2937;
    }

    .container {
        width: min(420px, 100%);
        text-align: center;
    }

    button {
        border: none;
        background: linear-gradient(135deg, #2563eb, #3b82f6);
        color: #fff;
        padding: 14px 20px;
        border-radius: 999px;
        font-size: 1rem;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        box-shadow: 0 12px 24px rgba(37, 99, 235, 0.18);
    }

    button:hover {
        transform: translateY(-1px);
    }

    button:disabled {
        opacity: 0.7;
        cursor: default;
        box-shadow: none;
    }

    .card {
        margin-top: 22px;
        background: #ffffff;
        border-radius: 24px;
        box-shadow: 0 22px 40px rgba(15, 23, 42, 0.08);
        padding: 22px;
        display: flex;
        gap: 18px;
        align-items: center;
        justify-content: flex-start;
        transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .card.hidden {
        display: none;
    }

    .card img {
        width: 96px;
        height: 96px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid #e5e7eb;
    }

    .info {
        text-align: left;
        flex: 1;
    }

    .info h2 {
        margin: 0 0 10px;
        font-size: 1.3rem;
    }

    .info p {
        margin: 0 0 14px;
        color: #475569;
        font-size: 1rem;
    }

    .info a {
        color: #2563eb;
        text-decoration: none;
        font-weight: 600;
    }

    .info a:hover {
        text-decoration: underline;
    }
</style>
<script>
    // Define the GitHub API URL for the user
    const requestUrl = 'https://api.github.com/users/ishitvamishra';
    // Create a new XMLHttpRequest object
    const xhr = new XMLHttpRequest();
    // Open a GET request to the API URL
    xhr.open('GET', requestUrl)
    // Set up the event handler for state changes
    xhr.onreadystatechange = function(){
        //readyState tells us the current state of the request. It goes from 0 to 4 as the request progresses.
        console.log(xhr.readyState);
        // When readyState is 4, it means the request is complete and we can process the response.
        if (xhr.readyState === 4) {
            //responseText contains the raw response data as a string. Since the GitHub API returns JSON, we need to parse it into a JavaScript object.
            const data = JSON.parse(this.responseText)
            console.log(typeof data);
            console.log(data.followers);
        }
    }
    xhr.send();
    // Get the button element by its ID
    const loadBtn = document.getElementById('loadBtn');
    // Get the profile card element by its ID
    const profileCard = document.getElementById('profileCard');
    // Get the avatar image element by its ID
    const avatar = document.getElementById('avatar');
    // Get the name heading element by its ID
    const nameEl = document.getElementById('name');
    // Get the followers paragraph element by its ID
    const followersEl = document.getElementById('followers');
    // Get the profile link element by its ID
    const profileLink = document.getElementById('profileLink');

    // Function to fill the profile card with data
    function fillProfileCard(data) {
        // Set the avatar image source to the user's avatar URL
        avatar.src = data.avatar_url;
        // Set the alt text for the avatar image
        avatar.alt = data.name ? `${data.name} avatar` : `${data.login} avatar`;
        // Set the name text, using name or login or default
        nameEl.textContent = data.name || data.login || 'GitHub User';
        // Set the followers text with the count
        followersEl.textContent = `Followers: ${data.followers}`;
        // Set the profile link href to the user's GitHub page
        profileLink.href = data.html_url;
        // Remove the hidden class to show the card
        //hidden class here is a css class that sets display to none, so removing it will make the card visible.
        profileCard.classList.remove('hidden');
    }

    // Function to handle errors and reset button
    function handleError(message) {
        // Re-enable the button
        loadBtn.disabled = false;
        // Reset button text
        loadBtn.textContent = 'Show GitHub Info';
        // Show error alert
        alert(message);
    }

    // Add click event listener to the button
    loadBtn.addEventListener('click', () => {
        // Disable the button to prevent multiple clicks
        loadBtn.disabled = true;
        // Change button text to show loading
        loadBtn.textContent = 'Loading...';

        // Create a new XMLHttpRequest object
        const xhr = new XMLHttpRequest();
        // Open a GET request to the API URL
        xhr.open('GET', requestUrl);
        // Set up the event handler for state changes
        xhr.onreadystatechange = function () {
            // If not done, return early
            if (xhr.readyState !== 4) return;

            // Re-enable the button
            loadBtn.disabled = false;
            // Reset button text
            loadBtn.textContent = 'Show GitHub Info';

            // If request successful
            if (xhr.status === 200) {
                // Parse the JSON response
                const data = JSON.parse(xhr.responseText);
                // Fill the profile card with data
                fillProfileCard(data);
            } else {
                // Handle error with status
                handleError(`Failed to load profile. Status: ${xhr.status}`);
            }
        };
        // Send the request
        xhr.send();
    });
</script>
</html>
