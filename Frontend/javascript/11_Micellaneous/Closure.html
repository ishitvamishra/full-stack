<!-- ============================================================
SCRIPT 2 — CLOSURE KA PRACTICAL USE: Button Click Handler
============================================================ -->
<script>

    // ──────────────────────────────────────────────
    // PEHLA TARIKA — Bina closure ke (Commented)
    // Problem: Har button ke liye alag function likhna pada
    //
    // document.getElementById("orange").onclick = function(){
    //     document.body.style.backgroundColor = `orange`
    // }
    // document.getElementById("green").onclick = function(){
    //     document.body.style.backgroundColor = `green`
    // }
    //
    // Yeh kaam karta hai, lekin:
    // - Repetition hai — agar 10 colors hote toh 10 functions
    // - DRY principle violate ho raha hai (Don't Repeat Yourself)
    // ──────────────────────────────────────────────


    // ──────────────────────────────────────────────
    // DOOSRA TARIKA — Closure ke saath ✅
    //
    // clickHandler ek FACTORY function hai —
    // color lekar ek nayi function BANATA aur RETURN karta hai
    // ──────────────────────────────────────────────

    function clickHandler(color) {

        // ⚠️ Yeh line commented hai — samajhna zaroori hai kyun:
        // document.body.style.backgroundColor = `${color}`
        //
        // Agar yeh uncommented hoti, toh:
        // clickHandler("orange") call hote hi TURANT background change ho jaata
        // Button click ka wait nahi karta — galat behavior!
        // Hume chahiye ki click HONE PAR change ho

        return function() {
            // ← Yeh CLOSURE hai!
            // Yeh inner function `color` ko yaad rakhta hai
            // chahe clickHandler() kab ka khatam ho chuka ho
            //
            // Jab orange button click hoga:
            //   → clickHandler("orange") se jo function return hua tha woh chalega
            //   → us function ko `color` = "orange" yaad hai (closure)
            //   → background orange ho jaayega
            document.body.style.backgroundColor = `${color}`
        }
    }

    // ──────────────────────────────────────────────
    // Yahan kya ho raha hai — LINE BY LINE
    //
    // clickHandler("orange") → abhi call hua
    //   → color = "orange" set hua
    //   → ek nayi function RETURN hui (click hone par chalegi)
    //   → woh function `onclick` mein save ho gayi
    //
    // Baad mein jab user Orange button dabayega:
    //   → saved function chalegi
    //   → color ki value "orange" yaad hai (closure!)
    //   → background = orange
    // ──────────────────────────────────────────────

    document.getElementById('orange').onclick = clickHandler("orange")
    //                                           ↑                  ↑
    //                               abhi call ho raha hai     color = "orange"
    //                               return mein ek function aa raha hai
    //                               woh function onclick mein store ho gaya

    document.getElementById('green').onclick = clickHandler("green")
    //                                          same cheez — alag color ke saath
    //                                          dono functions alag hain
    //                                          dono ke paas apna apna `color` yaad hai


    // ======================════════════════════════════════════
    // CLOSURE KA FAYDA: Memory efficient code likhna
    // Agar humne clickHandler ke andar `color` variable ko garbage collect kar diya hota,
    // toh click hone par background change nahi hota — kyunki `color` ki value available nahi hoti
    // Closure ke through humne `color` ko memory mein rakha, isliye click hone par woh value accessible hai
    // Aur humne ek hi function factory banaya, jisse hum multiple buttons ke liye alag alag functions bana sakte hain, bina code repeat kiye
    // ======================════════════════════════════════════
